<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <!-- One snowflake arm pointing UP from origin -->
    <g id="arm">
      <!-- Main stem -->
      <rect x="-9" y="-180" width="18" height="170" rx="9" ry="9" fill="url(#snowGrad)"/>
      <!-- Branch pair near tip -->
      <g transform="translate(0 -150)">
        <rect x="-6" y="-50" width="12" height="55" rx="6" ry="6" fill="url(#snowGrad)" transform="rotate(60)"/>
        <rect x="-6" y="-50" width="12" height="55" rx="6" ry="6" fill="url(#snowGrad)" transform="rotate(-60)"/>
      </g>
      <!-- Branch pair mid -->
      <g transform="translate(0 -95)">
        <rect x="-6" y="-44" width="12" height="48" rx="6" ry="6" fill="url(#snowGrad)" transform="rotate(60)"/>
        <rect x="-6" y="-44" width="12" height="48" rx="6" ry="6" fill="url(#snowGrad)" transform="rotate(-60)"/>
      </g>
      <!-- Diamond at tip -->
      <rect x="-10" y="-200" width="20" height="20" rx="4" ry="4" transform="rotate(45)" fill="url(#snowGrad)"/>
    </g>
  </defs>

  <!-- Background rounded plate -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#FAFAF7"/>

  <!-- Snowflake -->
  <g transform="translate(256 256)">
    <use href="#arm" transform="rotate(0)"/>
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>

    <!-- Hexagonal "block" at the center → blockchain -->
    <polygon points="0,-46 40,-23 40,23 0,46 -40,23 -40,-23" fill="#FAFAF7"/>
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" fill="url(#hexGrad)"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#FAFAF7"/>
  </g>
</svg>
