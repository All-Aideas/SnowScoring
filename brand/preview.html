<!doctype html>
<html><head><meta charset="utf-8"><title>SnowScore Brand Preview</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#fafaf7;padding:40px;}
  .row{margin-bottom:48px;}
  h3{margin:0 0 12px;font-weight:600;color:#1E3A8A;}
  .logo-light{background:#fff;display:inline-block;padding:24px;border-radius:24px;}
  .logo-dark{background:#0e1126;display:inline-block;padding:24px;border-radius:24px;margin-left:16px;}
  img.logo{width:200px;height:200px;display:block;}
  img.cover{width:840px;max-width:100%;height:auto;display:block;border-radius:16px;}
</style></head><body>
<div class="row">
  <h3>Logo · 512x512 (snowflake + hex block)</h3>
  <div class="logo-light"><img class="logo" src="logo.svg" alt=""></div>
  <div class="logo-dark"><img class="logo" src="logo.svg" alt=""></div>
</div>
<div class="row">
  <h3>Cover · 840x300</h3>
  <img class="cover" src="cover.svg" alt="">
</div>
</body></html>
